<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolarSystemSimulation3D</title>
    <style>
        /* ==========================================
           PREMIUM SİNEMATİK UI - UZAY GEMİSİ TEMASI
           ========================================== */

        /* CSS Değişkenleri */
        :root {
            --primary-glow: #4facfe;
            --secondary-glow: #667eea;
            --accent-gold: #ffc864;
            --panel-opacity: 0.85;
            --bg-dark: rgba(5, 10, 25, var(--panel-opacity));
            --bg-glass: rgba(10, 20, 40, 0.75);
            --border-glow: rgba(79, 172, 254, 0.35);
            --text-primary: #e8f4ff;
            --text-secondary: #8899aa;
            --font-display: 'Outfit', 'Segoe UI', sans-serif;
            --font-body: 'Outfit', 'Segoe UI', sans-serif;
        }

        /* GENEL AYARLAR */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: var(--font-body);
            user-select: none;
        }

        canvas {
            display: block;
        }

        /* ==========================================
           KONTROL PANELİ (SOL ÜST)
           ========================================== */
        #ui-container {
            position: absolute;
            top: 20px;
            left: -280px; /* Varsayılan olarak gizli */
            z-index: 10;
            width: 220px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            background: var(--bg-dark);
            padding: 14px;
            border-radius: 16px;
            border: 1px solid var(--border-glow);
            backdrop-filter: blur(20px);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.6),
                0 0 40px rgba(79, 172, 254, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: left 0.5s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0;
            pointer-events: none;
        }

        #ui-container::-webkit-scrollbar {
            width: 4px;
        }

        #ui-container::-webkit-scrollbar-thumb {
            background: var(--border-glow);
            border-radius: 2px;
        }

        #ui-container.active {
            left: 20px;
            opacity: 1;
            pointer-events: auto;
        }

        /* MENÜ TOGGLE BUTONU (Şık, Canlı ve Belirgin) */
        #menu-toggle-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 11;
            width: 36px;
            height: 36px;
            padding: 0;
            margin: 0;
            background: rgba(12, 28, 56, 0.85);
            border: 1px solid rgba(79, 172, 254, 0.6);
            border-radius: 50%;
            color: var(--primary-glow);
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5), 0 0 15px rgba(79, 172, 254, 0.4);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            text-shadow: 0 0 8px rgba(79, 172, 254, 0.8);
        }

        #menu-toggle-btn:hover {
            background: rgba(79, 172, 254, 0.25);
            border-color: #4facfe;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.7);
            transform: rotate(45deg);
        }

        #menu-toggle-btn.active {
            left: 250px;
            background: rgba(45, 15, 25, 0.85);
            border-color: rgba(255, 68, 68, 0.6);
            color: #ff6666;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 68, 68, 0.4);
            text-shadow: 0 0 8px rgba(255, 68, 68, 0.8);
        }

        #menu-toggle-btn.active:hover {
            background: rgba(255, 68, 68, 0.3);
            border-color: #ff4444;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.7);
            transform: rotate(90deg);
        }

        /* Panel Başlığı */
        #panel-title {
            display: block;
            font-family: var(--font-display);
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--primary-glow);
            text-align: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(79, 172, 254, 0.2);
        }

        /* PREMIUM BUTONLAR */
        button {
            width: 100%;
            padding: 10px 14px;
            font-family: var(--font-display);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.15) 0%, rgba(102, 126, 234, 0.1) 100%);
            color: var(--text-primary);
            border: 1px solid rgba(79, 172, 254, 0.25);
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.3) 0%, rgba(102, 126, 234, 0.2) 100%);
            border-color: var(--primary-glow);
            box-shadow:
                0 0 20px rgba(79, 172, 254, 0.25),
                0 4px 15px rgba(0, 0, 0, 0.3);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        /* Özel Buton Durumları */
        #pauseBtn.active {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            color: #000;
            border-color: #ffd700;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
        }

        #scaleBtn.active {
            background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
            color: #fff;
            border-color: #ff4444;
            box-shadow: 0 0 25px rgba(255, 68, 68, 0.5);
            animation: scaleGlow 2s infinite;
        }

        #orbitBtn.active {
            background: linear-gradient(135deg, #00c6fb 0%, #005bea 100%);
            color: #fff;
            border-color: #005bea;
            box-shadow: 0 0 25px rgba(0, 198, 251, 0.4);
        }

        /* Dil Seçim Butonu (Kompakt ve Şık) */
        #langBtn {
            padding: 8px 12px;
            font-size: 10px;
            letter-spacing: 1.2px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, rgba(255, 200, 100, 0.15) 0%, rgba(255, 150, 50, 0.08) 100%);
            border: 1px solid rgba(255, 200, 100, 0.35);
            color: #ffc864;
        }

        #langBtn:hover {
            background: linear-gradient(135deg, rgba(255, 200, 100, 0.28) 0%, rgba(255, 150, 50, 0.18) 100%);
            border-color: #ffc864;
            box-shadow: 0 0 15px rgba(255, 200, 100, 0.4);
        }

        /* Etkileşim Kilidi Açıkken Parlayan Durum */
        #lockBtn.unlocked {
            background: linear-gradient(135deg, rgba(255, 170, 0, 0.25) 0%, rgba(255, 100, 0, 0.15) 100%);
            color: #ffaa00;
            border-color: rgba(255, 170, 0, 0.5);
            box-shadow: 
                0 0 20px rgba(255, 170, 0, 0.3),
                0 4px 15px rgba(0, 0, 0, 0.4);
            animation: lockGlow 2s infinite;
        }

        @keyframes lockGlow {
            0%, 100% {
                box-shadow: 0 0 15px rgba(255, 170, 0, 0.2);
            }
            50% {
                box-shadow: 0 0 30px rgba(255, 170, 0, 0.5);
            }
        }

        @keyframes scaleGlow {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(255, 68, 68, 0.4);
            }

            50% {
                box-shadow: 0 0 35px rgba(255, 68, 68, 0.7);
            }
        }

        @keyframes statusGlow {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }


        /* SLIDER - Premium */
        .slider-container {
            color: var(--text-secondary);
            font-family: var(--font-display);
            font-size: 10px;
            letter-spacing: 1px;
            margin-top: 8px;
            padding: 8px 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border: 1px solid rgba(79, 172, 254, 0.1);
        }

        .slider-container label {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #speedValue {
            color: var(--primary-glow);
            font-weight: 700;
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            margin-top: 8px;
            background: linear-gradient(90deg, var(--primary-glow), var(--secondary-glow));
            border-radius: 2px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #fff 0%, #4facfe 100%);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(79, 172, 254, 0.5);
            transition: transform 0.2s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* ==========================================
           PREMİUM YARDIM PANELİ
           ========================================== */
        .help-panel {
            margin-top: 10px;
            padding: 10px;
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.08) 0%, rgba(102, 126, 234, 0.05) 100%);
            border-radius: 12px;
            border: 1px solid rgba(79, 172, 254, 0.2);
        }

        .help-panel-title {
            font-family: var(--font-display);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--primary-glow);
            text-align: center;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(79, 172, 254, 0.15);
        }

        .help-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 6px;
            margin-bottom: 4px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: default;
        }

        .help-item.disabled {
            opacity: 0.35;
            pointer-events: none;
            filter: grayscale(0.5);
        }

        .help-item:last-child {
            margin-bottom: 0;
        }

        .help-item:hover {
            background: rgba(79, 172, 254, 0.12);
            transform: translateX(4px);
        }

        .help-icon {
            display: none;
        }


        .help-content {
            flex: 1;
        }

        .help-action {
            font-family: var(--font-display);
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--text-primary);
            font-weight: 600;
        }

        .help-desc {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* ==========================================
           BİLGİ KARTI (SAĞ PANEL) - PREMIUM
           ========================================== */
        #info-panel {
            position: absolute;
            top: 20px;
            right: -420px;
            width: 360px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            background: var(--bg-dark);
            color: var(--text-primary);
            padding: 0;
            border-radius: 20px;
            border: 1px solid var(--border-glow);
            backdrop-filter: blur(25px);
            box-shadow:
                -15px 0 50px rgba(0, 0, 0, 0.7),
                0 0 50px rgba(79, 172, 254, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: right 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 10;
        }

        #info-panel::-webkit-scrollbar {
            width: 4px;
        }

        #info-panel::-webkit-scrollbar-thumb {
            background: var(--border-glow);
            border-radius: 2px;
        }

        #info-panel.active {
            right: 20px;
        }

        /* Kart Başlık Alanı */
        .info-header {
            padding: 24px 24px 20px;
            background: linear-gradient(180deg, rgba(79, 172, 254, 0.15) 0%, transparent 100%);
            border-bottom: 1px solid rgba(79, 172, 254, 0.2);
            position: relative;
        }

        #planet-name {
            margin: 0;
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 700;
            color: var(--primary-glow);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            text-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
        }

        /* Kapatma Butonu */
        #close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            padding: 0;
            margin: 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            color: var(--text-secondary);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        #close-btn:hover {
            background: rgba(255, 68, 68, 0.2);
            border-color: rgba(255, 68, 68, 0.5);
            color: #ff6666;
            transform: rotate(90deg);
        }

        /* Kart İçerik */
        #planet-details {
            padding: 20px 24px 24px;
        }

        /* Premium Tablo */
        .info-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 4px;
            font-size: 12px;
        }

        .info-table tr {
            background: rgba(255, 255, 255, 0.02);
            transition: background 0.3s;
        }

        .info-table tr:hover {
            background: rgba(79, 172, 254, 0.08);
        }

        .info-table td {
            padding: 10px 12px;
        }

        .info-table td:first-child {
            border-radius: 6px 0 0 6px;
        }

        .info-table td:last-child {
            border-radius: 0 6px 6px 0;
        }

        .info-table .label {
            font-family: var(--font-display);
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-secondary);
            width: 45%;
        }

        .info-table .value {
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            text-align: right;
        }

        /* Karşılaştırma Butonu */
        #compareBtn {
            width: 100%;
            margin-top: 16px;
            padding: 14px;
            background: linear-gradient(135deg, #00c6fb 0%, #005bea 100%);
            border: none;
            border-radius: 10px;
            font-family: var(--font-display);
            font-size: 11px;
            letter-spacing: 2px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 91, 234, 0.3);
        }

        #compareBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 91, 234, 0.5);
        }

        /* Açıklama Alanı */
        .info-description {
            margin-top: 20px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border-left: 3px solid var(--primary-glow);
        }

        .info-description p {
            margin: 0;
            font-size: 13px;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.85);
        }

        /* Fun Fact Alanı */
        .info-funfact {
            margin-top: 16px;
            padding: 14px 16px;
            background: linear-gradient(135deg, rgba(255, 200, 100, 0.1) 0%, rgba(255, 150, 50, 0.05) 100%);
            border-radius: 10px;
            border: 1px solid rgba(255, 200, 100, 0.2);
            font-size: 12px;
            line-height: 1.6;
            color: var(--accent-gold);
        }

        .info-funfact em {
            font-style: normal;
        }


    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Outfit:wght@300;400;600;700&display=swap"
        rel="stylesheet">


    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "gsap": "https://unpkg.com/gsap@3.12.5/index.js"
            }
        }
    </script>
  <script type="module" crossorigin src="./assets/index-B8F2M1Lt.js"></script>
</head>

<body>
    <button id="menu-toggle-btn" class="active">✕</button>
    <div id="ui-container" class="active">
        <div id="panel-title">◆ CONTROL CENTER</div>
        <button id="langBtn">🌐 English 🇬🇧</button>
        <button id="lockBtn" class="unlocked">Interaction: Open 🔓</button>
        <button id="pauseBtn">Pause ⏸️</button>
        <button id="scaleBtn">Realistic Scale: Off 🔘</button>
        <button id="orbitBtn">Orbits: Hidden 👁️‍🗨️</button>
        <div class="slider-container">
            <label id="lblSpeed">SPEED MULTIPLIER <span id="speedValue">1x</span></label>
            <input type="range" id="speedSlider" min="0" max="3" step="0.1" value="1">
        </div>
        <div class="slider-container">
            <label id="lblOpacity">OPACITY <span id="opacityValue">85%</span></label>
            <input type="range" id="opacitySlider" min="10" max="100" step="5" value="85">
        </div>
        <div class="slider-container">
            <label id="lblZoom">ZOOM <span id="zoomValue">50%</span></label>
            <input type="range" id="zoomSlider" min="0" max="100" step="1" value="50">
        </div>

        <!-- Premium Yardım Paneli -->
        <div class="help-panel">
            <div class="help-panel-title" id="lblControlsTitle">🎮 Controls</div>
            
            <div id="help-status-warning" style="text-align: center; font-size: 11px; padding: 8px 6px; border-radius: 8px; margin-bottom: 12px; background: rgba(0, 200, 100, 0.1); color: #00ff88; border: 1px solid rgba(0, 200, 100, 0.2); font-weight: bold; letter-spacing: 0.5px; animation: statusGlow 2s infinite;">
                🎮 INTERACTION OPEN: You can use the controls below 🔓
            </div>

            <div class="help-item" id="help-left-click">
                <div class="help-content">
                    <div class="help-action" id="lblHelpLeftAction">LEFT CLICK</div>
                    <div class="help-desc" id="lblHelpLeftDesc">View planet information</div>
                </div>
            </div>

            <div class="help-item" id="help-middle-click">
                <div class="help-content">
                    <div class="help-action" id="lblHelpMiddleAction">MIDDLE CLICK</div>
                    <div class="help-desc" id="lblHelpMiddleDesc">Focus on planet</div>
                </div>
            </div>

            <div class="help-item" id="help-right-click">
                <div class="help-content">
                    <div class="help-action" id="lblHelpRightAction">LEFT CLICK DRAG</div>
                    <div class="help-desc" id="lblHelpRightDesc">Rotate universe (When unlocked)</div>
                </div>
            </div>
        </div>
    </div>



    <div id="info-panel">
        <div class="info-header">
            <button id="close-btn">×</button>
            <h2 id="planet-name">Gezegen</h2>
        </div>
        <div id="planet-details"></div>
    </div>

</body>

</html>
